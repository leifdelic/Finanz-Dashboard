/* ── Crypto helpers (AES-GCM + PBKDF2) ── */
const _enc = new TextEncoder(), _dec = new TextDecoder();
async function deriveKey(password, salt) {
  const base = await crypto.subtle.importKey("raw", _enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name:"PBKDF2", salt, iterations:100000, hash:"SHA-256" }, base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
}
async function encrypt(data, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, _enc.encode(JSON.stringify(data)));
  const buf = new Uint8Array(salt.length + iv.length + ct.byteLength);
  buf.set(salt, 0); buf.set(iv, 16); buf.set(new Uint8Array(ct), 28);
  return btoa(String.fromCharCode(...buf));
}
async function decrypt(b64, password) {
  const buf = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const salt = buf.slice(0, 16), iv = buf.slice(16, 28), ct = buf.slice(28);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return JSON.parse(_dec.decode(plain));
}
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", _enc.encode("finanz_salt_2026_"+pw));
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

/* ── Encrypted storage ── */

const save = (k,v) => localStorage.setItem(k,JSON.stringify(v));
async function loadEncrypted(k, d, pw) {
  try { const v=localStorage.getItem(k+"_enc"); if(!v) return d; return await decrypt(v, pw); } catch{ return d; }
}
async function saveEncrypted(k, v, pw) {
  const enc = await encrypt(v, pw);
  localStorage.setItem(k+"_enc", enc);
  localStorage.removeItem(k); // remove old unencrypted
}

/* ── File-based persistent storage (works in ALL browsers) ── */
let _lastFileSave = 0;

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename || "finanz-data.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  _lastFileSave = Date.now();
}

function importJSON() {
  return new Promise((resolve) => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".json";
    input.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return resolve(null);
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (data && data.entries) resolve(data);
        else { alert("Ungueltige Datei: keine Eintraege gefunden."); resolve(null); }
      } catch { alert("Fehler beim Lesen der Datei."); resolve(null); }
    };
    input.click();
  });
}

/* ── Price Hook (BTC, Gold, Stocks — all via CoinGecko) ── */
function usePrices() {
  const [prices, setPrices] = useState({ btc:0, gold:0, aapl:0, amzn:0, googl:0, pltr:0 });
  const [loading, setLoading] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);

  const fetchPrices = useCallback(() => {
    setLoading(true);
    const ids = Object.values(CG_IDS).join(",");
    fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids+"&vs_currencies=chf")
      .then(r=>r.json()).then(d=>{
        const p = {};
        const get = (id) => d[id]?.chf || 0;
        p.btc = get(CG_IDS.btc); p.gold = get(CG_IDS.gold);
        STOCKS.forEach(s => p[s] = get(CG_IDS[s]));
        setPrices(p); setLastUpdate(new Date()); setLoading(false);
      }).catch(()=>setLoading(false));
  }, []);

  useEffect(()=>{ fetchPrices(); }, []);
  return { prices, loading, lastUpdate, refresh: fetchPrices };
}

/* ── clip SOLL to rolling window ── */
function clipSoll(istData, sollData, ahead) {
  const ik = Object.keys(istData).sort();
  if(!ik.length) return sollData;
  const [y,m] = ik[ik.length-1].split("-").map(Number);
  const cut = new Date(y, m-1+(ahead||4)); const ck = mKey(cut);
  const r = {}; for(const [k,v] of Object.entries(sollData)) { if(k<=ck) r[k]=v; } return r;
}

    <span style={{ fontSize:14, fontWeight:600, color:C.white, letterSpacing:"-0.02em" }}>{children}</span>{right}</div>;
}

function DualLineChart({ title, istData, sollData, unit, height, clipAhead, fillStart }) {
  const ref = useRef(null); const chart = useRef(null);
  const dSoll = useMemo(()=> clipAhead?clipSoll(istData,sollData,clipAhead):sollData, [istData,sollData,clipAhead]);

  useEffect(() => {
    if(!ref.current) return; if(chart.current) chart.current.destroy();
    const allK = [...new Set([...Object.keys(istData),...Object.keys(dSoll)])].sort();
    const istKeys=Object.keys(istData).sort();const firstIst=istKeys[0];
    const fillVal=fillStart!=null?fillStart:0;
    const filledIst=allK.map(k=>{if(istData[k]!=null)return istData[k];if(firstIst&&k<firstIst)return fillVal;return null;});
    chart.current = new Chart(ref.current, {
      type:"line",
      data:{ labels:allK.map(mLabel), datasets:[
        { label:"IST", data:filledIst, borderColor:"#1c1c1e", backgroundColor:"rgba(28,28,30,0.10)",
          borderWidth:1.5, pointRadius:0, pointHoverRadius:4, pointBackgroundColor:"#1c1c1e", fill:true, tension:0.3, spanGaps:true },
        { label:"SOLL", data:allK.map(k=>dSoll[k]??null), borderColor:"#aeaeb2", borderWidth:1.5, borderDash:[5,4],
          pointRadius:0, fill:false, tension:0.3, spanGaps:true }
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400,easing:"easeOutQuart"},
        interaction:{intersect:false,mode:"index"},
        plugins:{
          legend:{ display:false },
          tooltip:{ backgroundColor:"#fff", borderColor:"#e5e5ea", borderWidth:1, titleColor:"#1c1c1e",
            titleFont:{family:"Inter",weight:600,size:12}, bodyColor:"#3c3c43", bodyFont:{family:"JetBrains Mono",size:12},
            padding:12, cornerRadius:10, callbacks:{ label:ctx=>ctx.dataset.label+": "+(unit||"CHF ")+fmt(ctx.parsed.y) }}
        },
        scales:{
          x:{ ticks:{color:C.sub,font:{size:10,family:"Inter"},maxRotation:45}, grid:{display:false}, border:{display:false} },
          y:{ ticks:{color:C.sub,font:{size:10,family:"JetBrains Mono"},callback:v=>(unit||"CHF ")+fmt(v),maxTicksLimit:6},
            grid:{color:"#f2f2f7",drawBorder:false}, border:{display:false} }
        }
      }
    });
    return ()=>{ if(chart.current) chart.current.destroy(); };
  }, [istData,dSoll,unit,title]);

  return <Section><div style={{fontSize:13,fontWeight:500,color:C.muted,marginBottom:14}}>{title}</div>
    <div style={{height:height||200}}><canvas ref={ref}/></div></Section>;
}

/* ── Portfolio Chart with zoom + milestones ── */
function PortfolioChart({ istData, sollData }) {
  const ref = useRef(null); const chart = useRef(null);

  const ZOOMS = {
    "100k": { max:120000, label:"100k" },
    "250k": { max:280000, label:"250k" },
    "500k": { max:550000, label:"500k" },
    "1M":   { max:1100000, label:"1M" },
    "2M":   { max:2200000, label:"2M" },
    "3M":   { max:3300000, label:"3M" },
    "5M":   { max:5500000, label:"5M" },
    "all":  { max:null, label:"Alle" },
  };
  const MILESTONES = [
    { v:100000, label:"100k" },
    { v:250000, label:"250k" },
    { v:500000, label:"500k" },
    { v:1000000, label:"1 Mio" },
    { v:2000000, label:"2 Mio" },
    { v:3000000, label:"3 Mio" },
    { v:5000000, label:"5 Mio" },
    { v:5300000, label:"5.3 Mio" },
  ];

  const zoomCfg = ZOOMS[zoom];
  const clippedSoll = useMemo(()=>{
    if(!zoomCfg.max) return sollData;
    const r = {};
    for(const [k,v] of Object.entries(sollData)){ r[k]=v; if(v>=zoomCfg.max) break; }
    return r;
  },[sollData, zoom]);

  useEffect(() => {
    if(!ref.current) return; if(chart.current) chart.current.destroy();
    const allK = [...new Set([...Object.keys(istData),...Object.keys(clippedSoll)])].sort();
    const labels = allK.map(mLabel);
    const visibleMilestones = MILESTONES.filter(m => !zoomCfg.max || m.v <= zoomCfg.max);

    const datasets = [
      { label:"IST", data:allK.map(k=>istData[k]??null), borderColor:"#1c1c1e", backgroundColor:"rgba(28,28,30,0.10)",
        borderWidth:1.5, pointRadius:0, pointHoverRadius:4, pointBackgroundColor:"#1c1c1e", fill:true, tension:0.3, spanGaps:true, order:1 },
      { label:"SOLL", data:allK.map(k=>clippedSoll[k]??null), borderColor:"#aeaeb2", borderWidth:1.5, borderDash:[5,4],
        pointRadius:0, fill:false, tension:0.3, spanGaps:true, order:2 },
    ];

    visibleMilestones.forEach(m => {
      datasets.push({
        label: m.label, data: allK.map(()=>m.v),
        borderColor:"#d1d1d6", borderWidth:1, borderDash:[3,3],
        pointRadius:0, fill:false, tension:0, order:3,
      });
    });

    chart.current = new Chart(ref.current, {
      type:"line", data:{ labels, datasets },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400,easing:"easeOutQuart"},
        interaction:{intersect:false,mode:"index"},
        plugins:{
          legend:{ display:false },
          tooltip:{ backgroundColor:"#fff", borderColor:"#e5e5ea", borderWidth:1, titleColor:"#1c1c1e",
            titleFont:{family:"Inter",weight:600,size:12}, bodyColor:"#3c3c43", bodyFont:{family:"JetBrains Mono",size:12},
            padding:12, cornerRadius:10, filter: item => item.dataset.label==="IST"||item.dataset.label==="SOLL",
            callbacks:{ label:ctx=>ctx.dataset.label+": CHF "+fmt(ctx.parsed.y) }}
        },
        scales:{
          x:{ ticks:{color:C.sub,font:{size:10,family:"Inter"},maxRotation:45}, grid:{display:false}, border:{display:false} },
          y:{ max:zoomCfg.max||undefined,
            ticks:{color:C.sub,font:{size:10,family:"JetBrains Mono"},callback:v=>"CHF "+fmt(v),maxTicksLimit:6},
            grid:{color:"#f2f2f7",drawBorder:false}, border:{display:false},
            afterFit: function(axis) {
              // add milestone labels
            }
          }
        }
      }
    });
    return ()=>{ if(chart.current) chart.current.destroy(); };
  }, [istData, clippedSoll, zoom]);

  const zBtn = (id) => <button key={id} onClick={()=>setZoom(id)} style={{
    padding:"4px 12px", borderRadius:6, fontSize:11, fontWeight:500, border:"none",
    background:zoom===id?"#1c1c1e":"#f2f2f7", color:zoom===id?"#fff":"#8e8e93",
  }}>{ZOOMS[id].label}</button>;

  return <Section>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <span style={{fontSize:13,fontWeight:500,color:C.muted}}>Vermögen</span>

        {Object.keys(ZOOMS).map(id=>zBtn(id))}

    <div style={{height:260}}><canvas ref={ref}/></div>
  </Section>;
}

        borderWidth:1.5, pointRadius:0, pointHoverRadius:4, pointBackgroundColor:"#1c1c1e", fill:true, tension:0.3, spanGaps:true, order:1 },
      { label:"SOLL", data:allK.map(k=>clippedSoll[k]??null), borderColor:"#aeaeb2", borderWidth:1.5, borderDash:[5,4],
        pointRadius:0, fill:false, tension:0.3, spanGaps:true, order:2 },
    ];
    visibleMs.forEach(m => {
      datasets.push({ label:m.label, data:allK.map(()=>m.v), borderColor:"#d1d1d6", borderWidth:1, borderDash:[3,3],
        pointRadius:0, fill:false, tension:0, order:3 });
    });

    chart.current = new Chart(ref.current, {
      type:"line", data:{ labels, datasets },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400,easing:"easeOutQuart"},
        interaction:{intersect:false,mode:"index"},
        plugins:{
          legend:{ display:false },
          tooltip:{ backgroundColor:"#fff", borderColor:"#e5e5ea", borderWidth:1, titleColor:"#1c1c1e",
            titleFont:{family:"Inter",weight:600,size:12}, bodyColor:"#3c3c43", bodyFont:{family:"JetBrains Mono",size:12},
            padding:12, cornerRadius:10, filter:item=>item.dataset.label==="IST"||item.dataset.label==="SOLL",
            callbacks:{ label:ctx=>ctx.dataset.label+": CHF "+fmt(ctx.parsed.y)+"/Mo" }}
        },
        scales:{
          x:{ ticks:{color:C.sub,font:{size:10,family:"Inter"},maxRotation:45}, grid:{display:false}, border:{display:false} },
          y:{ max:zoomCfg.max||undefined,
            ticks:{color:C.sub,font:{size:10,family:"JetBrains Mono"},callback:v=>"CHF "+fmt(v),maxTicksLimit:6},
            grid:{color:"#f2f2f7",drawBorder:false}, border:{display:false} }
        }
      }
    });
    return ()=>{ if(chart.current) chart.current.destroy(); };
  }, [istData, clippedSoll, zoom]);

  const zBtn = (id) => <button key={id} onClick={()=>setZoom(id)} style={{
    padding:"4px 12px", borderRadius:6, fontSize:11, fontWeight:500, border:"none",
    background:zoom===id?"#1c1c1e":"#f2f2f7", color:zoom===id?"#fff":"#8e8e93",
  }}>{ZOOMS[id].label}</button>;

  return <Section>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <span style={{fontSize:13,fontWeight:500,color:C.muted}}>Business-Profit netto (monatlich)</span>
      <div style={{display:"flex",gap:4}}>
        {zBtn("1k")}{zBtn("5k")}{zBtn("10k")}{zBtn("all")}
      </div>
    </div>
    <div style={{height:220}}><canvas ref={ref}/></div>
  </Section>;
}

function Progress({ label, value, target }) {
  const p = pct(value,target);
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.text,marginBottom:6}}>
      <span style={{fontWeight:500}}>{label}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.sub}}>
        {fmt(value)} / {fmt(target)} <span style={{marginLeft:8,fontWeight:600,color:p>=100?C.positive:C.text}}>{p}%</span></span>
    </div>
    <div style={{height:5,background:"#f2f2f7",borderRadius:3,overflow:"hidden"}}>
      <div style={{height:"100%",width:Math.min(100,p)+"%",background:C.white,borderRadius:3,transition:"width 0.4s ease"}}/></div></div>;
}

function ProgressMilestones({ label, value, target, milestones }) {
  const p = Math.min(100, Math.max(0, value/target*100));
  const fmtShort = v => v>=1000000?(v/1000000).toFixed(v%1000000===0?0:1)+"M":v>=1000?Math.round(v/1000)+"k":v;
  return <div style={{marginBottom:18}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.text,marginBottom:6}}>
      <span style={{fontWeight:500}}>{label}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.sub}}>
        CHF {fmt(value)} / {fmt(target)} <span style={{marginLeft:8,fontWeight:600,color:p>=100?C.positive:C.text}}>{p.toFixed(2)}%</span></span>
    </div>
    <div style={{position:"relative",height:5,background:"#f2f2f7",borderRadius:3,overflow:"visible"}}>
      <div style={{height:"100%",width:Math.min(100,p)+"%",background:C.white,borderRadius:3,transition:"width 0.4s ease",position:"relative",zIndex:2}}/>
      {milestones.map((m,i)=>{const mp=m/target*100; return mp<=100?<div key={i} style={{position:"absolute",left:mp+"%",top:-1,width:1,height:7,background:value>=m?"#34c759":"#d1d1d6",zIndex:1}}/>:null;})}
    </div>
    <div style={{position:"relative",height:14,marginTop:2}}>
      {milestones.map((m,i)=>{const mp=m/target*100; return mp<=100?<span key={i} style={{position:"absolute",left:mp+"%",transform:"translateX(-50%)",
        fontSize:8,color:value>=m?"#34c759":C.dim,fontFamily:"'JetBrains Mono',monospace",fontWeight:500,whiteSpace:"nowrap"}}>{fmtShort(m)}</span>:null;})}
    </div>
  </div>;
}

function EditableList({ items, onChange, label, onDelete, onRename }) {
  const total = items.reduce((s,i)=>s+i[1],0);
  const [ed,setEd]=useState(null); const [nn,setNn]=useState(""); const [nv,setNv]=useState("");
  const upd=(i,f,v)=>onChange(items.map((it,j)=>j===i?(f===0?[v,it[1]]:[it[0],+v]):it));
  const rm=i=>onChange(items.filter((_,j)=>j!==i));

  return <Section>

      :<span style={{fontSize:14,fontWeight:600,color:C.white}}>{label}</span>}
      <span style={{fontSize:14,fontWeight:600,color:C.white,fontFamily:"'JetBrains Mono',monospace"}}>{fmt2(total)}</span>
    </div>
    {items.map((it,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 0",
      borderBottom:i<items.length-1?"1px solid #f2f2f7":"none"}}>

        <input type="text" value={it[0]} onChange={e=>upd(i,0,e.target.value)} style={{flex:1,fontSize:13,padding:"5px 10px"}}/>
        <input type="number" value={it[1]} onChange={e=>upd(i,1,e.target.value)} style={{width:100,fontSize:13,padding:"5px 10px",textAlign:"right"}}/></div>
      :<><span style={{flex:1,fontSize:13,color:C.muted,cursor:"pointer"}} onClick={()=>setEd(i)}>{it[0]}</span>
        <span style={{fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:C.text,cursor:"pointer",minWidth:80,textAlign:"right"}} onClick={()=>setEd(i)}>{fmt2(it[1])}</span></>}
    </div>)}
    <div style={{display:"flex",gap:8,marginTop:12}}>
      <input type="text" placeholder="Position" value={nn} onChange={e=>setNn(e.target.value)} style={{flex:1,fontSize:12,padding:"7px 12px"}}/>
      <input type="number" placeholder="CHF" value={nv} onChange={e=>setNv(e.target.value)} style={{width:90,fontSize:12,padding:"7px 12px"}}/>
      <button onClick={add} style={{background:"#f2f2f7",border:"none",borderRadius:8,color:C.muted,fontSize:12,padding:"7px 14px",fontWeight:500}}>+</button>
    </div></Section>;
}

/* ── Geldfluss Flow Visual ── */
function GeldflussFlow({ gf, bizProfit, onAddCustom, onUpdateItems, onRemoveCustom, labels }) {
  const [phase,setPhase]=useState("schulden");
  const [expanded,setExpanded]=useState(null);

  const fixSum=gf.fixkosten.reduce((s,f)=>s+f[1],0);
  const essenSum=gf.essen.reduce((s,e)=>s+e[1],0);
  const gemSum=gf.gemeinsam.reduce((s,g)=>s+g[1],0);
  const perSum=gf.periodisch.reduce((s,p)=>s+p[1],0);
  const schulden=phase==="schulden"?gf.schulden:0;
  const biz=Math.max(0,bizProfit||0);
  const sparrate=gf.income-fixSum-essenSum-gemSum-gf.privat*2-gf.gesundheit-perSum-schulden;
  const isInvest=phase==="invest";

  const W=1100, nw=130, nh=48, r=8;
  const y0=30, y1=115, y2=230, y3=360, y4=470, pad=30;

  const graph = useMemo(()=>{
    const nodes=[], edges=[];
    // Two income sources side by side
    nodes.push({id:"income",x:W/2-220,y:y0,w:200,h:nh,label:"Job-Einkommen",sub:"CHF "+fmt(gf.income)});
    nodes.push({id:"biz_income",x:W/2+20,y:y0,w:200,h:nh,label:"Business-Einkommen",sub:""});
    nodes.push({id:"hub",x:W/2-115,y:y1,w:230,h:nh,label:"Gemeinschaftskonto",sub:"UBS · Drehscheibe"});
    edges.push({from:"income",to:"hub",amt:gf.income});

    const customGroups=(gf.custom||[]);
    const customSum=customGroups.reduce((s,c)=>s+(c.items||[]).reduce((a,i)=>a+i[1],0),0);
    const r2=[
      {id:"fix",label:(labels||{}).fixkosten||"Fixkosten",sub:fmt(Math.round(fixSum)),expandable:true,items:gf.fixkosten,dataKey:"fixkosten"},
      {id:"essen",label:(labels||{}).essen||"Essen + Versorgung",sub:fmt(Math.round(essenSum)),expandable:true,items:gf.essen,dataKey:"essen"},
      {id:"gemeinsam",label:(labels||{}).gemeinsam||"Gemeinsam",sub:fmt(Math.round(gemSum)),expandable:true,items:gf.gemeinsam,dataKey:"gemeinsam"},
      ...customGroups.map(c=>{const cs=(c.items||[]).reduce((s,i)=>s+i[1],0);return{id:"custom_"+c.id,customId:c.id,label:c.label,sub:fmt(Math.round(cs)),expandable:true,items:c.items||[]};}),
      {id:"patrik",label:"Patrik",sub:fmt(gf.privat)},
      {id:"julia",label:"Julia",sub:fmt(gf.privat)},
    ];
    const gap2=(W-2*pad)/r2.length;
    r2.forEach((item,i)=>{nodes.push({...item,x:pad+i*gap2+(gap2-nw)/2,y:y2,w:nw,h:nh});});
    const amts={fix:fixSum,essen:essenSum,gemeinsam:gemSum,patrik:gf.privat,julia:gf.privat};
    customGroups.forEach(c=>{const cs=(c.items||[]).reduce((s,i)=>s+i[1],0);amts["custom_"+c.id]=cs;});
    r2.forEach(item=>{edges.push({from:"hub",to:item.id,amt:amts[item.id]||0});});

    const r3=[];
    r3.push({id:"gesundheit",label:"Gesundheit",sub:fmt(gf.gesundheit)+"/Mo"});
    r3.push({id:"period",label:(labels||{}).periodisch||"Period. Kosten",sub:fmt(Math.round(perSum))+"/Mo",expandable:true,items:gf.periodisch,dataKey:"periodisch"});
    if(phase==="schulden") r3.push({id:"schuld",label:"Schulden",sub:fmt(schulden)+"/Mo",highlight:true});
    const goalId=isInvest?"invest_node":"notgroschen";
    r3.push({id:goalId,label:isInvest?"Investment":"Notgroschen",sub:fmt(Math.round(sparrate))+"/Mo",highlight:phase!=="schulden"});
    r3.push({id:"sparziele",label:"Sparziele",sub:"Überschüsse"});
    r3.push({id:"erlebnis",label:"Erlebniskasse",sub:"Überschüsse"});

    const gap3=(W-2*pad)/r3.length;
    r3.forEach((item,i)=>{nodes.push({...item,x:pad+i*gap3+(gap3-nw)/2,y:y3,w:nw,h:nh});});
    r3.forEach(item=>{
      if(item.id==="erlebnis"||item.id==="sparziele")return;
      const am={gesundheit:gf.gesundheit,period:perSum,schuld:schulden,[goalId]:sparrate};
      edges.push({from:"hub",to:item.id,amt:am[item.id]||0});
    });
    // Business income → current focus goal
    const bizTarget=phase==="schulden"?"schuld":goalId;
    edges.push({from:"biz_income",to:bizTarget,amt:biz});

    ["fix","essen","gemeinsam",...customGroups.map(c=>"custom_"+c.id),"patrik","julia","gesundheit","period"].forEach(src=>{
      edges.push({from:src,to:"erlebnis",amt:null,dashed:true});
    });

    if(isInvest){
      const btc=Math.round(sparrate*0.5),akt=Math.round(sparrate*0.25),gld=Math.round(sparrate)-btc-akt;
      [{id:"btc",label:"Bitcoin 50%",sub:fmt(btc),amt:btc},{id:"aktien",label:"Aktien 25%",sub:fmt(akt),amt:akt},
       {id:"gold",label:"Gold 25%",sub:fmt(gld),amt:gld}].forEach((item,i)=>{
        const bGap=(W-300)/3;
        nodes.push({...item,x:150+i*bGap+(bGap-nw)/2,y:y4,w:nw,h:42});
        edges.push({from:"invest_node",to:item.id,amt:item.amt});
      });
    }
    return {nodes,edges,svgH:isInvest?y4+42+30:y3+nh+30};
  },[phase,gf,sparrate,schulden,isInvest,fixSum,essenSum,gemSum,perSum,biz,labels]);

  const nodeMap={}; graph.nodes.forEach(n=>{nodeMap[n.id]=n;});
  const vPath=(fid,tid)=>{const f=nodeMap[fid],t=nodeMap[tid]; if(!f||!t)return"";
    const fx=f.x+f.w/2,fy=f.y+f.h,tx=t.x+t.w/2,ty=t.y,g=ty-fy;
    return"M"+fx+","+fy+" C"+fx+","+(fy+g*0.5)+" "+tx+","+(ty-g*0.5)+" "+tx+","+ty;};
  const dotDur=a=>{if(!a)return 7;if(a>5000)return 3;if(a>2000)return 3.6;if(a>1000)return 4.2;if(a>500)return 5;if(a>200)return 5.6;return 6.5;};
  const dotCount=a=>{if(!a)return 1;if(a>3000)return 3;if(a>1000)return 2;return 1;};

  const expNode=expanded?graph.nodes.find(n=>n.id===expanded):null;
  const expItems=expNode?.items; const expTotal=expItems?expItems.reduce((s,i)=>s+i[1],0):0;

  const phaseInfo={
    schulden:{t:"Phase 1: Schulden tilgen",d:"1'140 CHF/Mo (Feb–Mai 26)"},
    notgroschen:{t:"Phase 2: Notgroschen",d:"Ziel 27'000 CHF (6 Monatsausgaben)"},
    invest:{t:"Phase 3: Investieren",d:"Barbell: 50% BTC · 25% Aktien · 25% Gold"},
  };

  return <div>
    <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:10}}>
      {[{id:"schulden",l:"Schulden",s:"Feb–Mai 26"},{id:"notgroschen",l:"Notgroschen",s:"Jun 26–Mär 27"},{id:"invest",l:"Investieren",s:"Ab Apr 27"}].map(p=>
        <button key={p.id} onClick={()=>{setPhase(p.id);setExpanded(null);}} style={{
          padding:"7px 16px",borderRadius:8,fontSize:12,fontWeight:500,
          border:"none",background:phase===p.id?"#1c1c1e":"#f2f2f7",
          color:phase===p.id?"#fff":"#636366",
        }}>{p.l} <span style={{fontSize:9,opacity:0.6}}>· {p.s}</span></button>
      )}
    </div>
    <div style={{textAlign:"center",marginBottom:12}}>
      <span style={{fontSize:11,color:C.white,fontWeight:500}}>{phaseInfo[phase].t}</span>
      <span style={{fontSize:10,color:C.sub,marginLeft:8}}>{phaseInfo[phase].d}</span>
    </div>

    <Section style={{padding:"16px 12px",overflow:"auto"}}>
      <svg key={phase} viewBox={"0 0 "+W+" "+graph.svgH} width="100%" style={{display:"block",minHeight:340}}>
        {graph.edges.map((edge,i)=>{
          const d=vPath(edge.from,edge.to); if(!d)return null;
          const pid="e"+i; const thick=edge.amt?Math.max(1.2,Math.min(4,edge.amt/1400)):1;
          const dur=dotDur(edge.amt); const dots=dotCount(edge.amt); const isDash=edge.dashed;
          const eCol=isDash?"#34c759":C.flow;
          return <g key={pid}>
            <path d={d} fill="none" stroke={eCol} strokeWidth={isDash?0.8:thick} opacity={isDash?0.25:0.2}
              strokeDasharray={isDash?"7 4":"1000"} strokeDashoffset={isDash?0:1000}
              style={isDash?{animation:"dashFlow 1.5s linear infinite"}:{animation:"draw 1.2s ease-out "+(0.1+i*0.04)+"s forwards"}}/>
            <path id={pid+"p"} d={d} fill="none" stroke="none"/>
            {!isDash&&Array.from({length:dots}).map((_,di)=>
              <circle key={di} r={Math.min(2.5,thick+0.3)} fill={C.flow} opacity="0.5"
                style={{animation:"fadeIn 0.4s ease "+(0.8+i*0.06)+"s both"}}>
                <animateMotion dur={dur+"s"} repeatCount="indefinite" begin={(0.8+i*0.08+di*(dur/dots))+"s"}>
                  <mpath href={"#"+pid+"p"}/></animateMotion></circle>)}
            {isDash&&<circle r="1.5" fill="#34c759" opacity="0.3">
              <animateMotion dur="8s" repeatCount="indefinite" begin={(1.5+i*0.3)+"s"}>
                <mpath href={"#"+pid+"p"}/></animateMotion></circle>}
          </g>;
        })}
        {graph.nodes.map((node,i)=>{
          const isExp=node.expandable; const isHi=node.highlight; const isActive=expanded===node.id;
          return <g key={node.id} onClick={isExp?()=>setExpanded(prev=>prev===node.id?null:node.id):undefined}
            style={{cursor:isExp?"pointer":"default",animation:"fadeIn 0.4s ease "+(i*0.03)+"s both"}}>
            <rect x={node.x} y={node.y} width={node.w} height={node.h} rx={r}
              fill={C.nodeBg} stroke={isActive?"#1c1c1e":isHi?"#1c1c1e":C.nodeBorder} strokeWidth={isActive||isHi?1.5:1}/>
            {isExp&&<text x={node.x+6} y={node.y+12} fill={C.sub} style={{fontSize:7,fontWeight:600}}>{isActive?"▲":"▼"}</text>}
            <text x={node.x+node.w/2} y={node.sub?node.y+18:node.y+node.h/2+4} textAnchor="middle" fill={C.white}
              style={{fontSize:10.5,fontWeight:600,fontFamily:"Inter,system-ui,sans-serif"}}>{node.label}</text>
            {node.sub&&<text x={node.x+node.w/2} y={node.y+32} textAnchor="middle" fill={C.muted}
              style={{fontSize:10.5,fontWeight:600,fontFamily:"JetBrains Mono,monospace"}}>{node.sub}</text>}
          </g>;
        })}
      </svg>
    </Section>

    {expItems&&expNode&&(()=>{
      const dk=expNode.dataKey; const cid=expNode.customId;
      const canEdit=!!(dk||cid);
      const doUpdate=(ni)=>{if(!onUpdateItems)return;if(dk)onUpdateItems(dk,ni);else if(cid)onUpdateItems("__custom",cid,ni);};
      const moveItem=(idx,dir)=>{if(!canEdit)return;const ni=[...expItems];const t=ni[idx];ni[idx]=ni[idx+dir];ni[idx+dir]=t;doUpdate(ni);};
      const delItem=(idx)=>{if(!canEdit)return;const ni=expItems.filter((_,j)=>j!==idx);doUpdate(ni);if(ni.length===0)setExpanded(null);};
      return <Section style={{animation:"fadeIn 0.25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600,color:C.white}}>{expNode.label} · Einzelposten</span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {cid&&onRemoveCustom&&<span onClick={()=>{setExpanded(null);onRemoveCustom(cid);}} style={{cursor:"pointer",fontSize:11,color:C.sub,padding:"6px 12px",borderRadius:6,background:"#f2f2f7"}}>Konto löschen</span>}
          <span onClick={()=>setExpanded(null)} style={{cursor:"pointer",fontSize:14,color:C.sub,padding:"6px 10px",borderRadius:6,background:"#f2f2f7"}}>✕</span>
        </div>
      </div>
      {expItems.map((item,i)=>{const pctW=Math.max(8,item[1]/expTotal*100);
        return <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",
          borderBottom:i<expItems.length-1?"1px solid #f2f2f7":"none"}}>
          {canEdit&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
            <span onClick={()=>i>0&&moveItem(i,-1)} style={{cursor:i>0?"pointer":"default",opacity:i>0?0.6:0.15,fontSize:10,lineHeight:1,padding:"1px 3px",color:C.muted}}>▲</span>
            <span onClick={()=>i<expItems.length-1&&moveItem(i,1)} style={{cursor:i<expItems.length-1?"pointer":"default",opacity:i<expItems.length-1?0.6:0.15,fontSize:10,lineHeight:1,padding:"1px 3px",color:C.muted}}>▼</span>
          </div>}
          <span style={{fontSize:12,color:C.muted,flex:1}}>{item[0]}</span>
          <div style={{width:60,height:4,background:"#f2f2f7",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:pctW+"%",background:"#d1d1d6",borderRadius:2}}/></div>
          <span style={{fontSize:12,fontWeight:500,fontFamily:"'JetBrains Mono',monospace",color:C.text,minWidth:70,textAlign:"right"}}>{fmt2(item[1])}</span>
          {canEdit&&<span onClick={()=>delItem(i)} style={{cursor:"pointer",fontSize:11,color:C.dim,padding:"2px 4px"}}>✕</span>}
        </div>;})}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1px solid #f2f2f7",fontSize:13,fontWeight:600}}>
        <span style={{color:C.white}}>Total</span>
        <span style={{color:C.white,fontFamily:"'JetBrains Mono',monospace"}}>CHF {fmt2(expTotal)}</span></div>
    </Section>;})()}

    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:4,fontSize:10,color:C.sub}}>
      <span>▼ = klickbar</span>
      <span style={{color:"#34c759"}}>- - - Überschüsse → Erlebniskasse</span>
    </div>
  </div>;
}

/* ── Patrik Personal Geldfluss ── */
function PatrikFlow({ patrik, spassgeld, onRemoveGroup, onUpdateGroupItems }) {
  const spass = spassgeld || patrik.spassgeld || 400;
  const groups = patrik.groups || [];
  const groupsTotal = groups.reduce((s,g)=>s+(g.items||[]).reduce((a,i)=>a+i[1],0),0);
  const rest = Math.max(0, spass - groupsTotal);

  const W=900, nw=130, nh=48, r=8;
  const y0=30, y1=120, y2=240;

  const graph = useMemo(()=>{
    const nodes=[], edges=[];

    nodes.push({id:"haushalt",x:W/2-100,y:y0,w:200,h:nh,label:"Spassgeld",sub:"CHF "+fmt(spass)+"/Mo"});
    nodes.push({id:"patrik_hub",x:W/2-100,y:y1,w:200,h:nh,label:"Patrik",sub:"Persönliches Budget"});
    edges.push({from:"haushalt",to:"patrik_hub",amt:spass});

    const items = [];
    groups.forEach(g=>{const gs=(g.items||[]).reduce((s,i)=>s+i[1],0);
      items.push({id:"grp_"+g.id,groupId:g.id,label:g.label,sub:fmt(gs)+"/Mo",expandable:true,itemList:g.items||[],deletable:true});});
    items.push({id:"sparziele",label:"Sparziele",sub:"Überschüsse"});

    const gap=(W-60)/items.length;
    items.forEach((item,i)=>{
      nodes.push({...item,x:30+i*gap+(gap-nw)/2,y:y2,w:nw,h:nh});
    });
    groups.forEach(g=>{const gs=(g.items||[]).reduce((s,i)=>s+i[1],0);
      edges.push({from:"patrik_hub",to:"grp_"+g.id,amt:gs});});
    edges.push({from:"patrik_hub",to:"sparziele",amt:0});

    return {nodes,edges,svgH:y2+nh+40};
  },[spass,groups,rest,groupsTotal]);

  const [expanded,setExpanded]=useState(null);
  const nodeMap={}; graph.nodes.forEach(n=>{nodeMap[n.id]=n;});
  const vPath=(fid,tid)=>{const f=nodeMap[fid],t=nodeMap[tid]; if(!f||!t)return"";
    const fx=f.x+f.w/2,fy=f.y+f.h,tx=t.x+t.w/2,ty=t.y,g=ty-fy;
    return"M"+fx+","+fy+" C"+fx+","+(fy+g*0.5)+" "+tx+","+(ty-g*0.5)+" "+tx+","+ty;};
  const dotDur=a=>{if(!a)return 7;if(a>5000)return 3;if(a>2000)return 3.6;if(a>1000)return 4.2;if(a>500)return 5;if(a>200)return 5.6;return 6.5;};
  const dotCount=a=>{if(!a)return 1;if(a>3000)return 3;if(a>1000)return 2;return 1;};

  const expNode=expanded?graph.nodes.find(n=>n.id===expanded):null;
  const expItems=expNode?.itemList; const expTotal=expItems?expItems.reduce((s,i)=>s+i[1],0):0;

  return <div>
    <Section style={{padding:"16px 12px",overflow:"auto"}}>
      <svg viewBox={"0 0 "+W+" "+graph.svgH} width="100%" style={{display:"block",minHeight:280}}>
        <style>{`
          @keyframes draw{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
          @keyframes fadeIn{from{opacity:0}to{opacity:1}}
          @keyframes dashFlow{to{stroke-dashoffset:-11}}
        `}</style>
        {graph.edges.map((edge,i)=>{
          const d=vPath(edge.from,edge.to); if(!d)return null;
          const pid="pe"+i; const thick=edge.amt?Math.max(1.2,Math.min(4,edge.amt/400)):1;
          const dur=dotDur(edge.amt); const dots=dotCount(edge.amt); const isDash=edge.dashed;
          const eCol=isDash?"#ff9500":C.flow;
          return <g key={pid}>
            <path d={d} fill="none" stroke={eCol} strokeWidth={isDash?0.8:thick} opacity={isDash?0.3:0.2}
              strokeDasharray={isDash?"7 4":"1000"} strokeDashoffset={isDash?0:1000}
              style={isDash?{animation:"dashFlow 1.5s linear infinite"}:{animation:"draw 1.2s ease-out "+(0.1+i*0.04)+"s forwards"}}/>
            <path id={pid+"p"} d={d} fill="none" stroke="none"/>
            {!isDash&&Array.from({length:dots}).map((_,di)=>
              <circle key={di} r={Math.min(2.5,thick+0.3)} fill={C.flow} opacity="0.5"
                style={{animation:"fadeIn 0.4s ease "+(0.8+i*0.06)+"s both"}}>
                <animateMotion dur={dur+"s"} repeatCount="indefinite" begin={(0.8+i*0.08+di*(dur/dots))+"s"}>
                  <mpath href={"#"+pid+"p"}/></animateMotion></circle>)}
            {isDash&&<circle r="1.5" fill="#ff9500" opacity="0.4">
              <animateMotion dur="6s" repeatCount="indefinite" begin={(1.5+i*0.3)+"s"}>
                <mpath href={"#"+pid+"p"}/></animateMotion></circle>}
          </g>;
        })}
        {graph.nodes.map((node,i)=>{
          const isExp=node.expandable; const isHi=node.highlight; const isActive=expanded===node.id;
          return <g key={node.id} onClick={isExp?()=>setExpanded(prev=>prev===node.id?null:node.id):undefined}
            style={{cursor:isExp?"pointer":"default",animation:"fadeIn 0.4s ease "+(i*0.03)+"s both"}}>
            <rect x={node.x} y={node.y} width={node.w} height={node.h} rx={r}
              fill={C.nodeBg} stroke={isActive?"#1c1c1e":isHi?"#1c1c1e":C.nodeBorder} strokeWidth={isActive||isHi?1.5:1}/>
            {isExp&&<text x={node.x+6} y={node.y+12} fill={C.sub} style={{fontSize:7,fontWeight:600}}>{isActive?"▲":"▼"}</text>}
            <text x={node.x+node.w/2} y={node.sub?node.y+18:node.y+node.h/2+4} textAnchor="middle" fill={C.white}
              style={{fontSize:10.5,fontWeight:600,fontFamily:"Inter,system-ui,sans-serif"}}>{node.label}</text>
            {node.sub&&<text x={node.x+node.w/2} y={node.y+32} textAnchor="middle" fill={C.muted}
              style={{fontSize:10.5,fontWeight:600,fontFamily:"JetBrains Mono,monospace"}}>{node.sub}</text>}
          </g>;
        })}
      </svg>
    </Section>

    {expItems&&expNode&&(()=>{
      const gid=expNode.groupId;
      const moveItem=(idx,dir)=>{if(!onUpdateGroupItems||!gid)return;const ni=[...expItems];const t=ni[idx];ni[idx]=ni[idx+dir];ni[idx+dir]=t;onUpdateGroupItems(gid,ni);};
      const delItem=(idx)=>{if(!onUpdateGroupItems||!gid)return;const ni=expItems.filter((_,j)=>j!==idx);onUpdateGroupItems(gid,ni);if(ni.length===0)setExpanded(null);};
      return <Section style={{animation:"fadeIn 0.25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600,color:C.white}}>{expNode.label} · Einzelposten</span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {gid&&<span onClick={()=>{setExpanded(null);if(onRemoveGroup)onRemoveGroup(gid);}} style={{cursor:"pointer",fontSize:11,color:C.sub,padding:"6px 12px",borderRadius:6,background:"#f2f2f7"}}>Konto löschen</span>}
          <span onClick={()=>setExpanded(null)} style={{cursor:"pointer",fontSize:14,color:C.sub,padding:"6px 10px",borderRadius:6,background:"#f2f2f7"}}>✕</span>
        </div>
      </div>
      {expItems.map((item,i)=>{const pctW=Math.max(8,item[1]/expTotal*100);
        return <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",
          borderBottom:i<expItems.length-1?"1px solid #f2f2f7":"none"}}>
          {gid&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
            <span onClick={()=>i>0&&moveItem(i,-1)} style={{cursor:i>0?"pointer":"default",opacity:i>0?0.6:0.15,fontSize:10,lineHeight:1,padding:"1px 3px",color:C.muted}}>▲</span>
            <span onClick={()=>i<expItems.length-1&&moveItem(i,1)} style={{cursor:i<expItems.length-1?"pointer":"default",opacity:i<expItems.length-1?0.6:0.15,fontSize:10,lineHeight:1,padding:"1px 3px",color:C.muted}}>▼</span>
          </div>}
          <span style={{fontSize:12,color:C.muted,flex:1}}>{item[0]}</span>
          <div style={{width:60,height:4,background:"#f2f2f7",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:pctW+"%",background:"#d1d1d6",borderRadius:2}}/></div>
          <span style={{fontSize:12,fontWeight:500,fontFamily:"'JetBrains Mono',monospace",color:C.text,minWidth:70,textAlign:"right"}}>{fmt2(item[1])}</span>
          {gid&&<span onClick={()=>delItem(i)} style={{cursor:"pointer",fontSize:11,color:C.dim,padding:"2px 4px"}}>✕</span>}
        </div>;})}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1px solid #f2f2f7",fontSize:13,fontWeight:600}}>
        <span style={{color:C.white}}>Total</span>
        <span style={{color:C.white,fontFamily:"'JetBrains Mono',monospace"}}>CHF {fmt2(expTotal)}</span></div>
    </Section>;})()}

  </div>;
}

/* ══════════════ MAIN APP ══════════════ */
function App() {
  const [tab,setTab]=useState("dashboard");
  const [data,setData]=useState(()=>load("finanz_data",defaultData()));
  const [unsavedChanges,setUnsavedChanges]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");
  const {prices,loading,lastUpdate,refresh}=usePrices();

  // Warn before leaving with unsaved changes
  useEffect(()=>{
    const handler = (e) => { if(unsavedChanges){ e.preventDefault(); e.returnValue=""; } };
    window.addEventListener("beforeunload", handler);
    return ()=>window.removeEventListener("beforeunload", handler);
  },[unsavedChanges]);

  const handleSaveToFile = useCallback(()=>{
    downloadJSON(data, "finanz-data.json");
    setUnsavedChanges(false);
    setSaveMsg("Gespeichert!");
    setTimeout(()=>setSaveMsg(""),2000);
  },[data]);

  const handleLoadFromFile = useCallback(async()=>{
    const imported = await importJSON();
    if(imported){
      setData(imported);
      save("finanz_data",imported);
      setUnsavedChanges(false);
      setSaveMsg("Daten geladen!");
      setTimeout(()=>setSaveMsg(""),2000);
    }
  },[]);

  const persist=useCallback(fn=>{setData(prev=>{
    const next=typeof fn==="function"?fn(prev):fn;
    save("finanz_data",next);
    setUnsavedChanges(true);
    return next;
  });},[]);

const entries=data.entries||[];
  const latest=entries[entries.length-1]||{};
  const h=data.holdings||{};

  /* migrate old holdings format */
  const holdings = useMemo(()=>{
    if(h.btc_amount!==undefined) return {btc:h.btc_amount||0,gold_oz:h.gold_units||0,aapl:0,amzn:0,googl:0,pltr:0};
    return {btc:h.btc||0,gold_oz:h.gold_oz||0,aapl:h.aapl||0,amzn:h.amzn||0,googl:h.googl||0,pltr:h.pltr||0};
  },[h]);

  const pv = useMemo(()=>{
    const btc=(holdings.btc||0)*(prices.btc||0);
    const gold=(holdings.gold_oz||0)*(prices.gold||0);
    const stocks=STOCKS.reduce((s,k)=>s+(holdings[k]||0)*(prices[k]||0),0);
    return {btc,gold,stocks,total:btc+gold+stocks};
  },[holdings,prices]);

  const cashTotal=(latest.sparkonto||0)+(latest.bargeld||0);
  const schuldenCHF=Math.max(0,(latest.schulden_total||latest.schulden||0)-(latest.schulden_bezahlt||0));
  const netWorth=cashTotal+pv.total-schuldenCHF;

  const istNG=useMemo(()=>{const d={};entries.forEach(e=>d[e.month]=(e.sparkonto||0)+(e.bargeld||0));return d;},[entries]);
  const istSch=useMemo(()=>{const d={};entries.forEach(e=>d[e.month]=Math.max(0,(e.schulden_total||e.schulden||0)-(e.schulden_bezahlt||0)));return d;},[entries]);
  const istPf=useMemo(()=>{const d={};entries.forEach(e=>d[e.month]=(e.btc||0)+(e.aktien||0)+(e.gold||0));return d;},[entries]);
  const istBiz=useMemo(()=>{const d={};entries.forEach(e=>d[e.month]=(e.biz_rev||0)-(e.biz_cost||0));return d;},[entries]);

  const addEntry=()=>{
    const last=entries[entries.length-1]; const [y,m]=(last?.month||NOW).split("-").map(Number);
    const nd=new Date(y,m);
    console.log("addEntry: adding month", mKey(nd));
    persist(prev=>({...prev,entries:[...prev.entries,{month:mKey(nd),sparkonto:last?.sparkonto||0,bargeld:last?.bargeld||0,
      schulden_total:last?.schulden_total||last?.schulden||0,schulden_bezahlt:last?.schulden_bezahlt||0,btc:pv.btc||0,aktien:pv.stocks||0,gold:pv.gold||0,biz_rev:0,biz_cost:0,erlebniskasse:last?.erlebniskasse||0,anschaffungskasse:last?.anschaffungskasse||0,patrik_sparen:last?.patrik_sparen||0}]}));
  };
  const updateEntry=(idx,f,v)=>{persist(prev=>{const n=[...prev.entries];n[idx]={...n[idx],[f]:+v};return{...prev,entries:n};});};
  const removeEntry=idx=>{persist(prev=>{const ne=prev.entries.filter((_,i)=>i!==idx);if(ne.length===0){const nd=new Date();return{...prev,entries:[{month:mKey(nd),sparkonto:0,bargeld:0,schulden_total:0,schulden_bezahlt:0,btc:0,aktien:0,gold:0,biz_rev:0,biz_cost:0,erlebniskasse:0,anschaffungskasse:0,patrik_sparen:0}]};}return{...prev,entries:ne};});};

  const gf=data.geldfluss||defaultData().geldfluss;
  const gfLabels=gf.labels||{};
  const gfCustom=gf.custom||[];
  const gfSum=arr=>(arr||[]).reduce((s,i)=>s+i[1],0);
  const updateGF=(k,v)=>persist(prev=>({...prev,geldfluss:{...prev.geldfluss,[k]:v}}));
  const renameGFBuiltin=(key,label)=>updateGF("labels",{...gfLabels,[key]:label});

  const gfTotalOut=gfSum(gf.fixkosten)+gfSum(gf.essen)+gfSum(gf.gemeinsam)+gfSum(gf.periodisch)+gf.gesundheit+gf.privat*2+gf.schulden+gfCustomTotal;
  const gfSparrateNet=gf.income-gfTotalOut;

  const erlebnisse=data.erlebnisse||[];
  const addErlebnis=()=>persist(prev=>({...prev,erlebnisse:[...prev.erlebnisse,{id:Date.now(),name:"Neues Ziel",ziel:1000,gespart:0}]}));
  const updateErlebnis=(id,f,v)=>persist(prev=>({...prev,erlebnisse:prev.erlebnisse.map(e=>e.id===id?{...e,[f]:f==="name"?v:+v}:e)}));
  const removeErlebnis=id=>persist(prev=>({...prev,erlebnisse:prev.erlebnisse.filter(e=>e.id!==id)}));

  const anschaffungen=data.anschaffungen||[];

  const updateAnschaffung=(id,f,v)=>persist(prev=>({...prev,anschaffungen:(prev.anschaffungen||[]).map(a=>a.id===id?{...a,[f]:f==="name"?v:+v}:a)}));
  const removeAnschaffung=id=>persist(prev=>({...prev,anschaffungen:(prev.anschaffungen||[]).filter(a=>a.id!==id)}));

  const updateHolding=(k,v)=>persist(prev=>({...prev,holdings:{...prev.holdings,[k]:v}}));

  const updatePatrik=(k,v)=>persist(prev=>{const p={..._defPatrik,...(prev.patrik||{})}; return{...prev,patrik:{...p,[k]:v}};});
  const addPatrikZiel=()=>persist(prev=>{const p={..._defPatrik,...(prev.patrik||{})}; return{...prev,patrik:{...p,ziele:[...(p.ziele||[]),{id:Date.now(),name:"Neues Ziel",ziel:1000,gespart:0}]}};});
  const updatePatrikZiel=(id,f,v)=>persist(prev=>{const p={..._defPatrik,...(prev.patrik||{})}; return{...prev,patrik:{...p,ziele:(p.ziele||[]).map(z=>z.id===id?{...z,[f]:f==="name"?v:+v}:z)}};});
  const removePatrikZiel=id=>persist(prev=>{const p={..._defPatrik,...(prev.patrik||{})}; return{...prev,patrik:{...p,ziele:(p.ziele||[]).filter(z=>z.id!==id)}};});
  const addPatrikGroup=()=>updatePatrik("groups",[...patrik.groups,{id:Date.now(),label:"Neues Konto",items:[["Position",0]]}]);
  const updatePatrikGroup=(id,items)=>updatePatrik("groups",patrik.groups.map(g=>g.id===id?{...g,items}:g));
  const renamePatrikGroup=(id,label)=>updatePatrik("groups",patrik.groups.map(g=>g.id===id?{...g,label}:g));
  const removePatrikGroup=id=>updatePatrik("groups",patrik.groups.filter(g=>g.id!==id));
  const bizProfit=(latest.biz_rev||0)-(latest.biz_cost||0);

    boxShadow:tab===id?"0 1px 3px rgba(0,0,0,0.06)":"none"}}>
    {label}</button>;

  return <div style={{minHeight:"100vh",background:C.bg,padding:"32px 24px"}}>

      {/* Header */}

        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:C.white,letterSpacing:"-0.03em"}}>Finanz-Dashboard</h1>
          <p style={{fontSize:12,color:C.sub,marginTop:3}}>Patrik & Julia</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <button onClick={refresh} style={{
            background:"#f2f2f7",border:"none",borderRadius:8,padding:"8px 14px",
            fontSize:11,fontWeight:500,color:C.muted,display:"flex",alignItems:"center",gap:6}}>
            <span style={loading?{animation:"spin 1s linear infinite",display:"inline-block"}:{}}>↻</span>

        <div style={{fontSize:36,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:C.white,letterSpacing:"-0.04em",lineHeight:1}}>
          CHF {fmt(Math.round(netWorth))}</div>
        <div style={{display:"flex",gap:0,marginTop:20,borderTop:"1px solid "+C.border,paddingTop:18}}>
          {[{l:"Cash",v:cashTotal},{l:"Bitcoin",v:Math.round(pv.btc)},{l:"Aktien",v:Math.round(pv.stocks)},{l:"Gold",v:Math.round(pv.gold)},{l:"Schulden",v:-Math.round(schuldenCHF)}].map((m,i)=>
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:10,color:C.sub,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>{m.l}</div>

        </div>
      </Section>

      {/* Tabs */}

        {tabBtn("holdings","Holdings")}
        {tabBtn("entries","Monatsdaten")}
        {tabBtn("geldfluss","G. Geldfluss")}
        {tabBtn("patrik","P. Geldfluss")}
      </div>

      {/* ═══ DASHBOARD ═══ */}
      {tab==="dashboard"&&<div>
        <Section>
          <SectionTitle>Fortschritt</SectionTitle>
          <Progress label="Notgroschen" value={cashTotal} target={27000}/>
          {(()=>{const total=latest.schulden_total||latest.schulden||0;const paid=latest.schulden_bezahlt||0;return total>0?<Progress label="Schulden abbezahlt (CHF)" value={paid} target={total}/>:null;})()}

          </Section>;})()}

          <div style={{display:"flex",justifyContent:"center",marginTop:8,marginBottom:14}}>
            <button onClick={addPatrikGroup} style={{padding:"10px 24px",fontSize:12,fontWeight:500,color:C.sub,background:"none",border:"1.5px dashed #d1d1d6",borderRadius:10,letterSpacing:0.3}}>+ Neues Konto erstellen</button>
          </div>
        </div>
      </div>}

      {/* ═══ ERLEBNISKASSE ═══ */}
      {tab==="erlebnisse"&&(()=>{
        const ekTotal=(()=>{for(let i=entries.length-1;i>=0;i--){if(entries[i].erlebniskasse)return entries[i].erlebniskasse;}return 0;})();
        const ekVerteilt=erlebnisse.reduce((s,e)=>s+e.gespart,0);
        const ekVerfuegbar=Math.max(0,ekTotal-ekVerteilt);
        const ekZielTotal=erlebnisse.reduce((s,e)=>s+e.ziel,0);
        return <Section>
        <SectionTitle right={<button onClick={addErlebnis} style={{background:"#f2f2f7",border:"none",borderRadius:8,
          color:C.muted,fontSize:12,fontWeight:500,padding:"8px 18px"}}>+ Neues Ziel</button>}>Erlebniskasse</SectionTitle>
        <div style={{fontSize:12,color:C.sub,marginTop:-10,marginBottom:16}}>Virtuelle Töpfe innerhalb eines UBS-Kontos</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:18}}>
          <div style={{background:"#f8f8f8",borderRadius:10,padding:"14px 18px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.sub,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Kontostand</div>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:C.white}}>CHF {fmt(ekTotal)}</div>
          </div>
          <div style={{background:"#f8f8f8",borderRadius:10,padding:"14px 18px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.sub,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Verteilt</div>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:ekVerteilt>ekTotal?C.negative:C.white}}>CHF {fmt(ekVerteilt)}</div>
          </div>
          <div style={{background:"#f8f8f8",borderRadius:10,padding:"14px 18px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.sub,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Verfügbar</div>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:ekVerfuegbar>0?C.positive:C.dim}}>CHF {fmt(ekVerfuegbar)}</div>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{height:6,background:"#f2f2f7",borderRadius:3,overflow:"hidden"}}>
            {ekTotal>0&&<div style={{height:"100%",width:Math.min(100,ekVerteilt/ekTotal*100)+"%",background:ekVerteilt>ekTotal?"#ff3b30":"#1c1c1e",borderRadius:3,transition:"width 0.3s"}}/>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:10,color:C.sub}}>
            <span>{ekTotal>0?Math.round(ekVerteilt/ekTotal*100):0}% verteilt</span>
            <span>Ziel-Summe: CHF {fmt(ekZielTotal)}</span>
          </div>
        </div>
        {erlebnisse.map(er=><div key={er.id} style={{background:"#f8f8f8",borderRadius:10,padding:"18px 22px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <input type="text" value={er.name} onChange={e=>updateErlebnis(er.id,"name",e.target.value)}
              style={{background:"transparent",border:"none",color:C.white,fontSize:14,fontWeight:600,padding:0,width:"auto",fontFamily:"Inter"}}/>
            <span onClick={()=>removeErlebnis(er.id)} style={{cursor:"pointer",fontSize:12,color:C.dim}}>×</span></div>
          <Progress label="" value={er.gespart} target={er.ziel}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
            <NumInput label="Gespart (CHF)" value={er.gespart} onChange={v=>updateErlebnis(er.id,"gespart",v)}/>
            <NumInput label="Ziel (CHF)" value={er.ziel} onChange={v=>updateErlebnis(er.id,"ziel",v)}/></div></div>)}
        {erlebnisse.length===0&&<div style={{textAlign:"center",padding:"28px 0",color:C.sub,fontSize:13}}>Noch keine Sparziele.</div>}
      </Section>;})()}

    </div></div>;
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  componentDidCatch(e,info){this.setState({error:e});console.error("React Error:",e,info);}
  render(){if(this.state.error)return React.createElement("pre",{style:{padding:20,color:"red"}},
    "Error: "+this.state.error.message+"\n"+this.state.error.stack);return this.props.children;}
}
ErrorBoundary.getDerivedStateFromError=function(e){return{error:e};};
console.log("Script loaded OK, rendering App...");
try {
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<ErrorBoundary><App/></ErrorBoundary>);
  console.log("Render called OK");
} catch(e) {
  console.error("Render error:", e);
  document.getElementById("root").innerHTML = "<pre style='padding:20px;color:red'>"+e.message+"</pre>";
}
</script>
</body>
</html>
